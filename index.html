<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scorched Earth</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
canvas { display: block; }
#ui {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.65);
  color: #fff;
  padding: 8px 24px;
  border-radius: 6px;
  font-size: 18px;
  pointer-events: none;
  white-space: nowrap;
  border: 2px solid rgba(255,255,255,0.15);
  transition: border-color 0.2s;
}
#win {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.88);
  color: #fff;
  padding: 48px 72px;
  border-radius: 14px;
  font-size: 40px;
  text-align: center;
  border: 2px solid rgba(255,255,255,0.25);
  cursor: pointer;
}
#win small {
  display: block;
  font-size: 16px;
  margin-top: 14px;
  color: #999;
}
#keys {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  pointer-events: none;
  white-space: nowrap;
}
#vol {
  position: fixed;
  top: 12px;
  left: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.65);
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.12);
}
#vol span { color: rgba(255,255,255,0.65); font-size: 15px; user-select: none; }
#vol input[type=range] { width: 76px; cursor: pointer; accent-color: #5599ff; }
/* ── shop modal ────────────────────────────────────────────────────────────── */
#shop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 100;
  overflow-y: auto;
}
#shop-inner {
  max-width: 680px;
  margin: 40px auto;
  background: rgba(10,20,40,0.97);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 36px 40px;
  color: #fff;
  font-family: 'Courier New', monospace;
}
#shop-title {
  font-size: 26px;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 6px;
}
#shop-balance {
  text-align: center;
  font-size: 18px;
  color: #88ff88;
  margin-bottom: 24px;
}
#shop-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 28px;
}
.shop-card {
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 8px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
}
.shop-card h3 { font-size: 15px; margin-bottom: 4px; }
.shop-card .shop-desc { font-size: 12px; color: #aaa; margin-bottom: 8px; }
.shop-card .shop-meta { font-size: 13px; margin-bottom: 8px; }
.shop-card .shop-cost { color: #ffdd66; }
.shop-card .shop-owned { color: #88ccff; }
.shop-card button {
  padding: 6px 14px;
  background: #225599;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 5px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 13px;
}
.shop-card button:disabled {
  background: #333;
  color: #666;
  cursor: not-allowed;
}
.shop-card button:not(:disabled):hover { background: #3366bb; }
#shop-done {
  display: block;
  width: 100%;
  padding: 14px;
  background: #226622;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  font-size: 17px;
  font-family: 'Courier New', monospace;
  cursor: pointer;
  letter-spacing: 2px;
}
#shop-done:hover { background: #338833; }
/* ── weapon indicator (top-right) ─────────────────────────────────────────── */
#weapon-indicator {
  position: fixed;
  top: 62px;
  right: 12px;
  background: rgba(0,0,0,0.65);
  color: #fff;
  padding: 7px 16px;
  border-radius: 6px;
  font-size: 14px;
  font-family: 'Courier New', monospace;
  border: 1px solid rgba(255,255,255,0.15);
  pointer-events: none;
  text-align: right;
  line-height: 1.5;
}
/* ── setup screen ─────────────────────────────────────────────────────────── */
#setup {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  overflow-y: auto;
}
#setup-inner {
  max-width: 640px;
  margin: 36px auto;
  background: rgba(10,20,40,0.97);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 40px 44px;
  color: #fff;
  font-family: 'Courier New', monospace;
}
#setup-title {
  font-size: 32px;
  letter-spacing: 5px;
  text-align: center;
  margin-bottom: 4px;
}
#setup-subtitle {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 5px;
  margin-bottom: 30px;
}
#setup-player-count {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
  font-size: 14px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.7);
}
#setup-count-controls { display: flex; align-items: center; gap: 14px; }
#setup-count-controls button {
  width: 30px; height: 30px;
  background: #225599;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 6px;
  font-size: 20px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
}
#setup-count-controls button:hover { background: #3366bb; }
#setup-count-display { font-size: 22px; min-width: 28px; text-align: center; }
.setup-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  padding: 9px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 8px;
}
.setup-swatch {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  flex-shrink: 0;
}
.setup-name {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 5px;
  color: #fff;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  padding: 4px 8px;
  min-width: 0;
}
.setup-name:focus { outline: none; border-color: rgba(255,255,255,0.4); }
.setup-type-btn {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.18);
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  background: #1a3355;
  color: #aac4ff;
  white-space: nowrap;
  flex-shrink: 0;
}
.setup-type-btn.cpu-mode { background: #553311; color: #ffcc88; }
.setup-diff {
  padding: 4px 6px;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.5);
  color: #ccc;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
}
#setup-start {
  display: block;
  width: 100%;
  margin-top: 24px;
  padding: 14px;
  background: #1a5522;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  font-size: 18px;
  font-family: 'Courier New', monospace;
  letter-spacing: 3px;
  cursor: pointer;
}
#setup-start:hover { background: #226633; }
/* ── round count selector (setup) ────────────────────────────────────────── */
#setup-rounds-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
  font-size: 14px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.7);
}
#setup-rounds-controls { display: flex; gap: 8px; }
.rounds-btn {
  padding: 5px 16px;
  background: #1a2a44;
  color: #aac4ff;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 1px;
}
.rounds-btn:hover { background: #223366; }
.rounds-btn.active {
  background: #225599;
  color: #fff;
  border-color: rgba(255,255,255,0.45);
}
/* ── scoreboard overlay ───────────────────────────────────────────────────── */
#scoreboard {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 150;
  overflow-y: auto;
}
#scoreboard-inner {
  max-width: 620px;
  margin: 48px auto;
  background: rgba(8,16,32,0.98);
  border: 2px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 36px 44px;
  color: #fff;
  font-family: 'Courier New', monospace;
}
#scoreboard-title {
  font-size: 26px;
  letter-spacing: 5px;
  text-align: center;
  margin-bottom: 6px;
}
#scoreboard-subtitle {
  text-align: center;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  letter-spacing: 3px;
  margin-bottom: 26px;
  min-height: 18px;
}
#scoreboard-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 28px;
  font-size: 13px;
}
#scoreboard-table th {
  text-align: left;
  padding: 6px 10px;
  letter-spacing: 2px;
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
#scoreboard-table td {
  padding: 9px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.sb-player-cell { display: flex; align-items: center; gap: 8px; }
.sb-swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.rank-1 td { color: #ffd700; }
.rank-2 td { color: #c0c0c0; }
.rank-3 td { color: #cd7f32; }
.rank-dead td { color: rgba(255,255,255,0.35); }
#scoreboard-next {
  display: block;
  width: 100%;
  padding: 14px;
  background: #1a5522;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  font-size: 17px;
  font-family: 'Courier New', monospace;
  letter-spacing: 3px;
  cursor: pointer;
}
#scoreboard-next:hover { background: #226633; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui"></div>
<div id="win"></div>
<div id="vol">
  <span>🔊</span>
  <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.6">
</div>
<div id="keys">← → angle &nbsp;|&nbsp; ↑ ↓ power &nbsp;|&nbsp; SPACE fire &nbsp;|&nbsp; Q/E weapon &nbsp;|&nbsp; hold SHIFT ×5</div>
<div id="shop">
  <div id="shop-inner">
    <h2 id="shop-title">WEAPONS SHOP</h2>
    <div id="shop-balance"></div>
    <div id="shop-grid"></div>
    <button id="shop-done">DONE — Start Turn</button>
  </div>
</div>
<div id="weapon-indicator"></div>
<div id="setup">
  <div id="setup-inner">
    <h1 id="setup-title">SCORCHED EARTH</h1>
    <div id="setup-subtitle">ARTILLERY COMBAT</div>
    <div id="setup-player-count">
      <span>PLAYERS</span>
      <div id="setup-count-controls">
        <button id="setup-minus">−</button>
        <span id="setup-count-display">2</span>
        <button id="setup-plus">+</button>
      </div>
    </div>
    <div id="setup-rounds-row">
      <span>ROUNDS</span>
      <div id="setup-rounds-controls">
        <button class="rounds-btn" data-rounds="1">1</button>
        <button class="rounds-btn active" data-rounds="5">5</button>
        <button class="rounds-btn" data-rounds="10">10</button>
        <button class="rounds-btn" data-rounds="20">20</button>
      </div>
    </div>
    <div id="setup-rows"></div>
    <button id="setup-start">▶ START GAME</button>
  </div>
</div>
<div id="scoreboard">
  <div id="scoreboard-inner">
    <h2 id="scoreboard-title"></h2>
    <div id="scoreboard-subtitle"></div>
    <table id="scoreboard-table">
      <thead><tr>
        <th>PLAYER</th><th>KILLS</th><th>DAMAGE</th>
        <th>CASH EARNED</th><th>SCORE</th>
      </tr></thead>
      <tbody id="scoreboard-body"></tbody>
    </table>
    <button id="scoreboard-next"></button>
  </div>
</div>
<script>
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const ui      = document.getElementById('ui');
const winEl   = document.getElementById('win');
const shopEl       = document.getElementById('shop');
const setupEl      = document.getElementById('setup');
const scoreboardEl = document.getElementById('scoreboard');

// ── constants ──────────────────────────────────────────────────────────────
const GRAVITY    = 260;   // px/s²
const BLAST_R    = 48;    // default crater radius px
const TANK_HIT_R = 18;    // tank collision radius px
const HIT_DAMAGE   = 75;
const POWER_SCALE  = 7.77;
const CANNON_LEN   = 22;
const MAX_POWER    = 100;
const TRAIL_LEN    = 32;
const WIND_SCALE   = 6;
const MONEY_PER_DAMAGE = 10;

// ── weapon definitions ─────────────────────────────────────────────────────
const WEAPONS = {
  'Baby Missile': {
    cost: 0, blastR: 24, hitDamage: 38, type: 'standard',
    desc: 'Small blast. Infinite ammo.',
  },
  'Missile': {
    cost: 500, blastR: 48, hitDamage: 75, type: 'standard',
    desc: 'Standard warhead.',
  },
  'MIRV': {
    cost: 2000, blastR: 32, hitDamage: 55, type: 'mirv',
    desc: 'Splits into 3 warheads at peak.', subCount: 3, spreadVx: 120,
  },
  'Dirt Bomb': {
    cost: 300, blastR: 40, hitDamage: 0, type: 'dirt',
    desc: 'Raises terrain on impact.',
  },
  'Napalm': {
    cost: 1500, blastR: 36, hitDamage: 30, type: 'napalm',
    desc: 'Spreads fire along terrain.',
    napalmCount: 12, napalmSpeed: 55, napalmLife: 2.8,
  },
  'Funky Bomb': {
    cost: 3000, blastR: 100, hitDamage: 95, type: 'standard',
    desc: 'Massive blast radius.',
  },
};

// ── player / AI constants ──────────────────────────────────────────────────
const PLAYER_COLORS = [
  '#5599ff', // P1  — blue
  '#ff5555', // P2  — red
  '#55dd55', // P3  — green
  '#ffdd44', // P4  — yellow
  '#44dddd', // P5  — cyan
  '#ff8833', // P6  — orange
  '#dd44dd', // P7  — magenta
  '#88ff44', // P8  — lime
  '#ff88bb', // P9  — pink
  '#dddddd', // P10 — silver
];

const AI_DIFFICULTY = {
  easy:   { angleNoise: 26, powerNoise: 22 },
  medium: { angleNoise: 12, powerNoise: 10 },
  hard:   { angleNoise:  5, powerNoise:  4 },
};

const CPU_THINK_DELAY = 1.4;  // seconds before CPU fires
const AI_SIM_DT       = 1 / 120; // physics step for trajectory sweeps

// ── audio ──────────────────────────────────────────────────────────────────
let audioCtx    = null;
let masterGain  = null;
let whistleOsc  = null;
let whistleGain = null;
let masterVolume = 0.6;

function ensureAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { return false; }
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx.state !== 'closed';
}

function makeNoise(seconds) {
  const len = Math.ceil(audioCtx.sampleRate * seconds);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function soundFire() {
  if (!ensureAudio()) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const ogn = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(95, now);
  osc.frequency.exponentialRampToValueAtTime(22, now + 0.14);
  ogn.gain.setValueAtTime(1.0, now);
  ogn.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
  osc.connect(ogn); ogn.connect(masterGain);
  osc.start(now); osc.stop(now + 0.14);
  const ns  = audioCtx.createBufferSource();
  ns.buffer = makeNoise(0.05);
  const ngn = audioCtx.createGain();
  ngn.gain.setValueAtTime(0.28, now);
  ngn.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  ns.connect(ngn); ngn.connect(masterGain);
  ns.start(now);
}

function startWhistle() {
  if (!ensureAudio() || whistleOsc) return;
  whistleOsc  = audioCtx.createOscillator();
  whistleGain = audioCtx.createGain();
  whistleOsc.type = 'sine';
  whistleOsc.frequency.value = 500;
  whistleGain.gain.setValueAtTime(0, audioCtx.currentTime);
  whistleGain.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + 0.09);
  whistleOsc.connect(whistleGain);
  whistleGain.connect(masterGain);
  whistleOsc.start();
}

function updateWhistle(vx, vy) {
  if (!whistleOsc) return;
  const speed = Math.hypot(vx, vy);
  const freq  = Math.min(2400, 180 + speed * 1.15);
  whistleOsc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.07);
}

function stopWhistle() {
  if (!whistleOsc) return;
  const now = audioCtx.currentTime;
  whistleGain.gain.setTargetAtTime(0, now, 0.04);
  const o = whistleOsc, g = whistleGain;
  whistleOsc = null; whistleGain = null;
  setTimeout(() => { try { o.stop(); o.disconnect(); g.disconnect(); } catch (_) {} }, 300);
}

function soundExplosion() {
  if (!ensureAudio()) return;
  const now = audioCtx.currentTime;
  const dur = 1.5;
  const ns  = audioCtx.createBufferSource();
  ns.buffer = makeNoise(dur);
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.setValueAtTime(900, now);
  lpf.frequency.exponentialRampToValueAtTime(38, now + dur * 0.8);
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(1.0, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + dur);
  ns.connect(lpf); lpf.connect(gn); gn.connect(masterGain);
  ns.start(now); ns.stop(now + dur);
}

function soundTankHit() {
  if (!ensureAudio()) return;
  const now = audioCtx.currentTime;
  const dur = 0.55;
  const ns  = audioCtx.createBufferSource();
  ns.buffer = makeNoise(dur);
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.setValueAtTime(1600, now);
  bpf.frequency.exponentialRampToValueAtTime(280, now + dur * 0.7);
  bpf.Q.value = 1.4;
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.85, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + dur);
  ns.connect(bpf); bpf.connect(gn); gn.connect(masterGain);
  ns.start(now); ns.stop(now + dur);
  const ring = audioCtx.createOscillator();
  const rgn  = audioCtx.createGain();
  ring.type = 'triangle';
  ring.frequency.setValueAtTime(660, now);
  ring.frequency.exponentialRampToValueAtTime(160, now + 0.38);
  rgn.gain.setValueAtTime(0.38, now);
  rgn.gain.exponentialRampToValueAtTime(0.001, now + 0.38);
  ring.connect(rgn); rgn.connect(masterGain);
  ring.start(now); ring.stop(now + 0.38);
}

function soundAngle() {
  if (!ensureAudio()) return;
  const now = audioCtx.currentTime;
  const dur = 0.055;
  // noise click
  const ns  = audioCtx.createBufferSource();
  ns.buffer = makeNoise(dur);
  const bpf = audioCtx.createBiquadFilter();
  bpf.type = 'bandpass';
  bpf.frequency.value = 1800;
  bpf.Q.value = 2.0;
  const gn = audioCtx.createGain();
  gn.gain.setValueAtTime(0.55, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + dur);
  ns.connect(bpf); bpf.connect(gn); gn.connect(masterGain);
  ns.start(now); ns.stop(now + dur);
  // short tone punch
  const osc = audioCtx.createOscillator();
  const ogn = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(320, now);
  osc.frequency.exponentialRampToValueAtTime(160, now + dur);
  ogn.gain.setValueAtTime(0.25, now);
  ogn.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.connect(ogn); ogn.connect(masterGain);
  osc.start(now); osc.stop(now + dur);
}

function soundPower(dir) {
  // dir: +1 = increasing power (rising tone), -1 = decreasing (falling tone)
  if (!ensureAudio()) return;
  const now  = audioCtx.currentTime;
  const dur  = 0.07;
  const osc  = audioCtx.createOscillator();
  const gn   = audioCtx.createGain();
  osc.type = 'sine';
  const freqA = dir > 0 ? 260 : 440;
  const freqB = dir > 0 ? 440 : 260;
  osc.frequency.setValueAtTime(freqA, now);
  osc.frequency.exponentialRampToValueAtTime(freqB, now + dur);
  gn.gain.setValueAtTime(0.28, now);
  gn.gain.exponentialRampToValueAtTime(0.001, now + dur);
  osc.connect(gn); gn.connect(masterGain);
  osc.start(now); osc.stop(now + dur);
}

// ── game state ─────────────────────────────────────────────────────────────
let terrain, tanks, currentPlayer, gameOver, animId, lastTime, stars;
let wind             = 0;
let explosions       = [];
let projectiles      = [];
let napalmParticles  = [];
let turnCount        = 0;
let shopOpen         = false;
let napalmTurnPending = false;
let worldWidth       = 0;

// ── round / scoring state ──────────────────────────────────────────────────
let totalRounds      = 5;
let currentRound     = 1;
let playerStats      = [];  // [{ name, color, kills, damageDealt, cashEarned, roundWins, score }]
let cashAtRoundStart = [];  // tank.money snapshot at round start

// camera (world-space x/y offset; only x is used)
let camera = { x: 0, y: 0, targetX: 0, targetY: 0 };

// CPU AI state
let cpuThinking   = false;
let cpuThinkTimer = 0;
let cpuAimAngle   = 45;
let cpuAimPower   = 50;

// ── setup state (persists between games) ───────────────────────────────────
let playerConfigs    = [];
let setupRowData     = [];
let currentSetupCount = 2;

// ── resize ─────────────────────────────────────────────────────────────────
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ── midpoint displacement terrain ──────────────────────────────────────────
function generateTerrain() {
  const w = worldWidth, h = canvas.height;
  terrain = new Array(w);
  const lo = h * 0.42, hi = h * 0.74;
  terrain[0]     = lo + Math.random() * (hi - lo);
  terrain[w - 1] = lo + Math.random() * (hi - lo);

  function subdivide(l, r, scale) {
    if (r - l <= 1) return;
    const mid  = (l + r) >> 1;
    const disp = (Math.random() - 0.5) * scale * (r - l);
    terrain[mid] = Math.max(lo * 0.55, Math.min(hi * 1.08,
      (terrain[l] + terrain[r]) / 2 + disp));
    subdivide(l, mid, scale);
    subdivide(mid, r, scale);
  }
  subdivide(0, w - 1, 0.42);

  for (let x = 1; x < w - 1; x++) {
    if (terrain[x] == null) terrain[x] = (terrain[x - 1] + terrain[x + 1]) / 2;
  }
}

// ── stars ──────────────────────────────────────────────────────────────────
function generateStars() {
  stars = [];
  const count = Math.round(120 * (worldWidth / canvas.width));
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * worldWidth,
      y: Math.random() * canvas.height * 0.55,
      r: Math.random() < 0.15 ? 1.5 : 1,
      a: 0.4 + Math.random() * 0.6,
    });
  }
}

// ── tanks ──────────────────────────────────────────────────────────────────
function placeTanks() {
  const margin   = worldWidth * 0.08;
  const usable   = worldWidth * 0.84;
  const n        = playerConfigs.length;
  const segWidth = usable / n;

  tanks = [];
  for (let i = 0; i < n; i++) {
    const cfg      = playerConfigs[i];
    const segStart = margin + i * segWidth;
    const jitter   = segWidth * 0.15;
    const tx = Math.max(0, Math.min(worldWidth - 1,
      Math.floor(segStart + jitter + Math.random() * (segWidth - 2 * jitter))));
    const groundY = terrain[tx];
    const defaultAngle = tx < worldWidth / 2 ? 45 : 135;

    tanks.push({
      x: tx, y: groundY, vy: 0, falling: false, fallStartY: 0,
      color:    cfg.color,
      name:     cfg.name,
      isAI:     cfg.type === 'cpu',
      difficulty: cfg.difficulty || 'medium',
      angle:    defaultAngle,
      power:    50,
      health:      100,
      money:       5000,
      damageDealt: 0,
      killedBy:    -1,
      inventory: {
        'Baby Missile': Infinity,
        'Missile':    0,
        'MIRV':       0,
        'Dirt Bomb':  0,
        'Napalm':     0,
        'Funky Bomb': 0,
      },
      selectedWeapon: 'Baby Missile',
    });
  }
}

// ── wind ───────────────────────────────────────────────────────────────────
function newWind() {
  wind = Math.round((Math.random() * 2 - 1) * 10);
}

// ── camera helpers ─────────────────────────────────────────────────────────
function applyCamera() {
  ctx.save();
  ctx.translate(-Math.round(camera.x), -Math.round(camera.y));
}

function restoreCamera() {
  ctx.restore();
}

// ── draw: background + terrain ─────────────────────────────────────────────
function drawScene() {
  const w = worldWidth, h = canvas.height;

  // sky — spans full world width so stars and background are correct under camera
  const sky = ctx.createLinearGradient(0, 0, 0, h * 0.75);
  sky.addColorStop(0, '#04040f');
  sky.addColorStop(1, '#0b2238');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, w, h);

  for (const s of stars) {
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  let minY = terrain[0];
  for (let x = 1; x < w; x++) if (terrain[x] < minY) minY = terrain[x];

  const tg = ctx.createLinearGradient(0, minY, 0, h);
  tg.addColorStop(0.00, '#4a9c2a');
  tg.addColorStop(0.04, '#3d7020');
  tg.addColorStop(0.14, '#7a5230');
  tg.addColorStop(0.50, '#5c3d1e');
  tg.addColorStop(1.00, '#1e0e04');

  ctx.beginPath();
  ctx.moveTo(0, h);
  ctx.lineTo(0, terrain[0]);
  for (let x = 1; x < w; x++) ctx.lineTo(x, terrain[x]);
  ctx.lineTo(w - 1, h);
  ctx.closePath();
  ctx.fillStyle = tg;
  ctx.fill();
}

// ── draw: tank ─────────────────────────────────────────────────────────────
function drawTank(tank, active) {
  const { x, y, color, angle, health, name } = tank;
  const bodyY = y - 11;

  // dead tanks: show a dark wreck
  if (health <= 0) {
    ctx.fillStyle = 'rgba(40,20,10,0.7)';
    ctx.fillRect(x - 14, bodyY, 28, 12);
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.3;
    ctx.font = 'bold 13px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText(name, x, y - 58);
    ctx.globalAlpha = 1;
    return;
  }

  if (active) {
    ctx.beginPath();
    ctx.arc(x, y - 9, 28, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.22)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // treads
  ctx.fillStyle = '#383838';
  ctx.fillRect(x - 19, y - 7, 38, 8);
  ctx.fillStyle = '#555';
  ctx.fillRect(x - 17, y - 6, 6, 6);
  ctx.fillRect(x -  5, y - 6, 6, 6);
  ctx.fillRect(x +  7, y - 6, 6, 6);

  // hull + turret
  ctx.fillStyle = color;
  ctx.fillRect(x - 14, bodyY, 28, 12);
  ctx.beginPath();
  ctx.arc(x, bodyY, 9, Math.PI, 0);
  ctx.fill();

  // cannon
  const rad = angle * Math.PI / 180;
  ctx.beginPath();
  ctx.moveTo(x, bodyY);
  ctx.lineTo(x + Math.cos(rad) * CANNON_LEN, bodyY - Math.sin(rad) * CANNON_LEN);
  ctx.strokeStyle = color;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.stroke();

  // health bar
  const bw = 46, bh = 7, bx = x - 23, by = y - 54;
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(bx - 1, by - 1, bw + 2, bh + 2);
  ctx.fillStyle = health > 60 ? '#44dd44' : health > 30 ? '#ddcc22' : '#dd2222';
  ctx.fillRect(bx, by, bw * (health / 100), bh);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  ctx.fillStyle = color;
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(name, x, by - 5);
}

// ── draw: dotted aiming guide ──────────────────────────────────────────────
function drawAimGuide() {
  if (projectiles.length > 0) return;
  const tank  = tanks[currentPlayer];
  if (tank.health <= 0) return;
  const rad   = tank.angle * Math.PI / 180;
  const spd   = tank.power * POWER_SCALE;
  const wAcc  = wind * WIND_SCALE;
  const bodyY = tank.y - 11;

  let x  = tank.x + Math.cos(rad) * (CANNON_LEN + 5);
  let y  = bodyY  - Math.sin(rad) * (CANNON_LEN + 5);
  let vx = Math.cos(rad) * spd;
  let vy = -Math.sin(rad) * spd;

  ctx.save();
  ctx.setLineDash([3, 5]);
  ctx.strokeStyle = 'rgba(255,255,255,0.32)';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(x, y);

  const simDt = 0.003;
  let pathLen = 0, px0 = x, py0 = y;

  for (let i = 0; i < 600 && pathLen < 50; i++) {
    vy += GRAVITY * simDt;
    vx += wAcc   * simDt;
    x  += vx     * simDt;
    y  += vy     * simDt;
    pathLen += Math.hypot(x - px0, y - py0);
    px0 = x; py0 = y;
    ctx.lineTo(x, y);
    const ix = Math.round(x);
    if (ix >= 0 && ix < worldWidth && y >= 0 && y >= terrain[ix]) break;
  }

  ctx.stroke();
  ctx.restore();
}

// ── draw: projectiles with fading trail ────────────────────────────────────
function drawProjectiles() {
  for (const proj of projectiles) {
    const { x, y, trail } = proj;
    for (let i = 1; i < trail.length; i++) {
      const alpha = (i / trail.length) * 0.7;
      ctx.beginPath();
      ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
      ctx.lineTo(trail[i].x,     trail[i].y);
      ctx.strokeStyle = `rgba(255,170,30,${alpha.toFixed(2)})`;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.stroke();
    }
    const grd = ctx.createRadialGradient(x, y, 0, x, y, 9);
    grd.addColorStop(0, 'rgba(255,220,60,1)');
    grd.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
}

// ── draw: explosions ───────────────────────────────────────────────────────
function drawExplosions() {
  for (const e of explosions) {
    if (e.r <= 0 || e.alpha <= 0) continue;
    const a = e.alpha;
    const flash = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * 0.38);
    flash.addColorStop(0, `rgba(255,255,200,${a.toFixed(2)})`);
    flash.addColorStop(1, `rgba(255,200,50,0)`);
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * 0.38, 0, Math.PI * 2);
    ctx.fillStyle = flash;
    ctx.fill();
    const fire = ctx.createRadialGradient(e.x, e.y, e.r * 0.15, e.x, e.y, e.r);
    fire.addColorStop(0,    `rgba(255,110,0,${(a * 0.88).toFixed(2)})`);
    fire.addColorStop(0.55, `rgba(180,35,0,${(a * 0.55).toFixed(2)})`);
    fire.addColorStop(1,    `rgba(60,5,0,0)`);
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.fillStyle = fire;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r * 0.92, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,90,0,${(a * 0.45).toFixed(2)})`;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }
}

// ── draw: napalm fire particles ────────────────────────────────────────────
function drawNapalm() {
  for (const p of napalmParticles) {
    const lifeFrac = 1 - p.age / p.life;
    const xi = Math.round(Math.max(0, Math.min(worldWidth - 1, p.x)));
    const groundY = terrain[xi];
    const alpha = lifeFrac * 0.85;
    const grd = ctx.createRadialGradient(p.x, groundY, 0, p.x, groundY, 14);
    grd.addColorStop(0, `rgba(255,180,30,${alpha.toFixed(2)})`);
    grd.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.beginPath();
    ctx.arc(p.x, groundY, 14, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  }
}

// ── draw: wind indicator (screen-space, outside camera transform) ───────────
function drawWindIndicator() {
  const PAD = 12;
  const bw  = 185, bh = 38;
  const bx  = canvas.width - bw - PAD;
  const by  = PAD;
  const cy  = by + bh / 2;
  const mph = Math.round(Math.abs(wind) * 5);

  ctx.fillStyle = 'rgba(0,0,0,0.58)';
  ctx.beginPath();
  ctx.rect(bx, by, bw, bh);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('WIND', bx + 9, cy);

  const mphStr = `${mph} mph`;
  ctx.fillStyle = 'rgba(255,255,255,0.70)';
  ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(mphStr, bx + bw - 8, cy);

  const arrowOrigin = bx + 52;
  const maxLen      = 68;

  if (wind === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.38)';
    ctx.font = '13px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('calm', arrowOrigin, cy);
    return;
  }

  const len  = (Math.abs(wind) / 10) * maxLen;
  const dir  = wind > 0 ? 1 : -1;
  const gg   = Math.round(Math.max(50, 230 - Math.abs(wind) * 18));
  const arrowColor = `rgba(255,${gg},40,0.92)`;
  const startX = dir > 0 ? arrowOrigin       : arrowOrigin + len;
  const endX   = dir > 0 ? arrowOrigin + len : arrowOrigin;

  ctx.beginPath();
  ctx.moveTo(startX, cy);
  ctx.lineTo(endX, cy);
  ctx.strokeStyle = arrowColor;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.stroke();

  const tip = endX;
  ctx.beginPath();
  ctx.moveTo(tip,             cy);
  ctx.lineTo(tip - dir * 9,  cy - 5);
  ctx.lineTo(tip - dir * 9,  cy + 5);
  ctx.closePath();
  ctx.fillStyle = arrowColor;
  ctx.fill();
}

// ── terrain destruction ─────────────────────────────────────────────────────
function blastTerrain(cx, cy, r = BLAST_R) {
  const w = worldWidth, h = canvas.height;
  const x0 = Math.max(0,     Math.floor(cx - r));
  const x1 = Math.min(w - 1, Math.ceil (cx + r));
  for (let x = x0; x <= x1; x++) {
    const dx   = x - cx;
    const dy   = Math.sqrt(r * r - dx * dx);
    const newY = cy + dy;
    if (terrain[x] < newY) terrain[x] = Math.min(h, newY);
  }
}

// ── terrain construction (Dirt Bomb) ───────────────────────────────────────
function raiseTerrain(cx, cy, r) {
  const w = worldWidth;
  const x0 = Math.max(0,     Math.floor(cx - r));
  const x1 = Math.min(w - 1, Math.ceil (cx + r));
  for (let x = x0; x <= x1; x++) {
    const dx   = x - cx;
    const dy   = Math.sqrt(r * r - dx * dx);
    const newY = cy - dy;
    if (terrain[x] > newY) terrain[x] = Math.max(0, newY);
  }
}

// ── explosion lifecycle ─────────────────────────────────────────────────────
function addExplosion(x, y, r = BLAST_R) {
  explosions.push({ x, y, r: 2, maxR: r * 1.65, alpha: 1, age: 0, duration: 0.55 });
}

function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const e = explosions[i];
    e.age += dt;
    const p = Math.min(1, e.age / e.duration);
    e.r     = 2 + (e.maxR - 2) * Math.pow(p, 0.4);
    e.alpha = Math.max(0, 1 - Math.pow(p, 0.55));
    if (e.age >= e.duration) explosions.splice(i, 1);
  }
}

// ── tank physics ───────────────────────────────────────────────────────────
function updateTankPhysics(dt) {
  const w = worldWidth;
  for (const t of tanks) {
    if (t.health <= 0) continue;
    const tx      = Math.max(0, Math.min(w - 1, Math.round(t.x)));
    const groundY = terrain[tx];
    if (t.y < groundY - 0.5) {
      if (!t.falling) { t.falling = true; t.fallStartY = t.y; }
      t.vy += GRAVITY * dt;
      t.y  += t.vy * dt;
      if (t.y >= groundY) {
        t.y = groundY;
        t.vy = 0;
        const fallDist = t.y - t.fallStartY;
        const fallDmg  = Math.max(0, Math.round((fallDist - 20) * 0.45));
        if (fallDmg > 0) {
          t.health = Math.max(0, t.health - fallDmg);
          if (!gameOver) checkWin();
        }
        t.falling = false;
      }
    } else {
      t.vy = 0; t.y = groundY; t.falling = false;
    }
  }
}

// ── impact resolution ──────────────────────────────────────────────────────
function onImpact(proj, px, py) {
  const wep = proj.weapon;

  soundExplosion();
  addExplosion(px, py, wep.blastR);

  if (wep.type === 'dirt') {
    raiseTerrain(px, py, wep.blastR);
  } else {
    blastTerrain(px, py, wep.blastR);
  }

  let anyTankDamaged = false;
  if (wep.hitDamage > 0) {
    for (const t of tanks) {
      if (t.health <= 0) continue;
      const dist = Math.hypot(px - t.x, py - t.y);
      if (dist < wep.blastR + TANK_HIT_R) {
        const frac = Math.max(0, 1 - dist / (wep.blastR + TANK_HIT_R));
        const dmg  = Math.round(wep.hitDamage * Math.pow(frac, 1.4));
        if (dmg > 0) {
          const prevHealth = t.health;
          t.health = Math.max(0, t.health - dmg);
          tanks[proj.owner].money += dmg * MONEY_PER_DAMAGE;
          tanks[proj.owner].damageDealt += dmg;
          if (prevHealth > 0 && t.health <= 0) t.killedBy = proj.owner;
          anyTankDamaged = true;
        }
      }
    }
  }
  if (anyTankDamaged) setTimeout(soundTankHit, 80);

  if (wep.type === 'napalm') {
    spawnNapalm(px, py, proj.owner, wep);
    napalmTurnPending = true;
  }

  projectiles = projectiles.filter(p => p !== proj);

  if (projectiles.length === 0 && !napalmTurnPending) {
    stopWhistle();
    if (!checkWin()) nextTurn();
  }
}

// ── MIRV ───────────────────────────────────────────────────────────────────
function spawnMirvChildren(parent) {
  const wep = parent.weapon;
  const childWeapon = { blastR: wep.blastR, hitDamage: wep.hitDamage, type: 'standard' };
  for (const dvx of [-wep.spreadVx, 0, wep.spreadVx]) {
    projectiles.push({
      x: parent.x, y: parent.y,
      vx: parent.vx + dvx, vy: parent.vy,
      trail: [], type: 'standard', weapon: childWeapon,
      owner: parent.owner, mirvSplit: false,
    });
  }
  addExplosion(parent.x, parent.y, 16);
}

// ── napalm ─────────────────────────────────────────────────────────────────
function spawnNapalm(px, py, owner, wep) {
  const half = Math.floor(wep.napalmCount / 2);
  for (let i = 0; i < wep.napalmCount; i++) {
    const dir   = i < half ? -1 : 1;
    const speed = wep.napalmSpeed * (0.6 + Math.random() * 0.8);
    napalmParticles.push({
      x: px + (Math.random() - 0.5) * wep.blastR * 0.5,
      vx: dir * speed, life: wep.napalmLife * (0.5 + Math.random() * 0.5),
      age: 0, owner, damageTick: 0,
    });
  }
}

function updateNapalm(dt) {
  const w = worldWidth;
  for (let i = napalmParticles.length - 1; i >= 0; i--) {
    const p = napalmParticles[i];
    p.age += dt;
    if (p.age >= p.life) { napalmParticles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    const xi = Math.round(Math.max(0, Math.min(w - 1, p.x)));
    const groundY = terrain[xi];
    blastTerrain(p.x, groundY, 8);
    p.damageTick += dt;
    if (p.damageTick >= 0.3) {
      p.damageTick = 0;
      for (const t of tanks) {
        if (t.health <= 0) continue;
        const dist = Math.hypot(p.x - t.x, groundY - t.y);
        if (dist < 8 + TANK_HIT_R) {
          const prevHp = t.health;
          t.health = Math.max(0, t.health - 8);
          tanks[p.owner].money += 8 * MONEY_PER_DAMAGE;
          tanks[p.owner].damageDealt += 8;
          if (prevHp > 0 && t.health <= 0 && t.killedBy < 0) t.killedBy = p.owner;
          if (!gameOver) checkWin();
        }
      }
    }
  }
  if (napalmParticles.length === 0 && napalmTurnPending) {
    napalmTurnPending = false;
    stopWhistle();
    if (!checkWin()) nextTurn();
  }
}

// ── round end / win check ─────────────────────────────────────────────────
function checkWin() {
  if (gameOver) return true;
  const living = tanks.filter(t => t.health > 0);
  if (living.length <= 1) {
    gameOver = true;
    setTimeout(endRound, 900);
    return true;
  }
  return false;
}

function endRound() {
  // Credit kills
  tanks.forEach(t => {
    if (t.health <= 0 && t.killedBy >= 0) playerStats[t.killedBy].kills++;
  });

  // Award round win to survivor
  const living = tanks.filter(t => t.health > 0);
  if (living.length === 1) playerStats[tanks.indexOf(living[0])].roundWins++;

  // Accumulate per-round stats
  tanks.forEach((t, i) => {
    playerStats[i].damageDealt += t.damageDealt;
    playerStats[i].cashEarned  += Math.max(0, t.money - cashAtRoundStart[i]);
  });

  // Recompute scores
  playerStats.forEach(s => {
    s.score = s.kills * 1000 + s.damageDealt + s.roundWins * 500;
  });

  showScoreboard(currentRound >= totalRounds);
}

function showScoreboard(isFinal) {
  const living = tanks.filter(t => t.health > 0);

  document.getElementById('scoreboard-title').textContent =
    isFinal ? 'FINAL RESULTS' : `ROUND ${currentRound} OF ${totalRounds}`;

  let subtitle = '';
  if (!isFinal) {
    if (living.length === 1) {
      const w = living[0];
      subtitle = `<span style="color:${w.color}">${w.name} wins the round!</span>`;
    } else {
      subtitle = 'DRAW';
    }
  }
  document.getElementById('scoreboard-subtitle').innerHTML = subtitle;

  // Build rows — sort by score for final, preserve original order otherwise
  const indices = playerStats.map((_, i) => i);
  if (isFinal) indices.sort((a, b) => playerStats[b].score - playerStats[a].score);

  const tbody = document.getElementById('scoreboard-body');
  tbody.innerHTML = '';
  indices.forEach((si, rank) => {
    const s = playerStats[si];
    const tr = document.createElement('tr');
    if (isFinal) {
      tr.className = rank === 0 ? 'rank-1' : rank === 1 ? 'rank-2' : rank === 2 ? 'rank-3' : '';
    } else if (tanks[si] && tanks[si].health <= 0) {
      tr.className = 'rank-dead';
    }
    const rankPrefix = isFinal ? `${rank + 1}. ` : '';
    tr.innerHTML = `
      <td><div class="sb-player-cell">
        <div class="sb-swatch" style="background:${s.color}"></div>
        ${rankPrefix}${s.name}
      </div></td>
      <td>${s.kills}</td>
      <td>${s.damageDealt}</td>
      <td>$${s.cashEarned}</td>
      <td>${s.score}</td>
    `;
    tbody.appendChild(tr);
  });

  const btn = document.getElementById('scoreboard-next');
  btn.textContent = isFinal ? '▶ PLAY AGAIN' : 'NEXT ROUND →';
  btn.onclick = isFinal ? () => { scoreboardEl.style.display = 'none'; showSetup(); }
                        : startNextRound;

  winEl.style.display = 'none';
  scoreboardEl.style.display = 'block';
}

function startNextRound() {
  scoreboardEl.style.display = 'none';
  currentRound++;

  const savedMoney = tanks.map(t => t.money);

  gameOver          = false;
  projectiles       = [];
  napalmParticles   = [];
  explosions        = [];
  currentPlayer     = 0;
  lastTime          = null;
  turnCount         = 0;
  shopOpen          = false;
  napalmTurnPending = false;
  cpuThinking       = false;
  cpuThinkTimer     = 0;
  camera.x = camera.targetX = 0;
  camera.y = camera.targetY = 0;

  generateTerrain();
  generateStars();
  placeTanks();
  tanks.forEach((t, i) => { t.money = savedMoney[i]; });

  cashAtRoundStart = tanks.map(t => t.money);

  newWind();
  updateUI();
  updateWeaponIndicator();
  setCameraTarget(tanks[0]);
  camera.x = camera.targetX;

  runShopPhase(() => {
    currentPlayer = 0;
    const n = tanks.length;
    for (let i = 0; i < n; i++) {
      if (tanks[currentPlayer].health > 0) break;
      currentPlayer = (currentPlayer + 1) % n;
    }
    updateUI();
    updateWeaponIndicator();
    setCameraTarget(tanks[currentPlayer]);
    if (tanks[currentPlayer].isAI) setTimeout(startCpuTurn, 400);
  });
}

// ── turn management ────────────────────────────────────────────────────────
function nextTurn() {
  if (gameOver) return;

  cpuThinking   = false;
  cpuThinkTimer = 0;
  turnCount++;

  // Advance to next living player
  const n = tanks.length;
  for (let attempts = 0; attempts < n; attempts++) {
    currentPlayer = (currentPlayer + 1) % n;
    if (tanks[currentPlayer].health > 0) break;
  }

  newWind();
  updateUI();
  updateWeaponIndicator();

  // Update camera target
  setCameraTarget(tanks[currentPlayer]);

  // CPU turn
  if (tanks[currentPlayer].isAI) {
    setTimeout(startCpuTurn, 400);
  }
}

function setCameraTarget(tank) {
  const maxCamX  = Math.max(0, worldWidth - canvas.width);
  camera.targetX = Math.max(0, Math.min(maxCamX, tank.x - canvas.width / 2));
  camera.targetY = 0;
}

function updateUI() {
  if (gameOver) return;
  const t   = tanks[currentPlayer];
  const inv = t.inventory[t.selectedWeapon];
  const ammo = inv === Infinity ? '∞' : String(inv);
  const tag  = t.isAI ? ' [CPU]' : '';
  ui.textContent = `R${currentRound}/${totalRounds}  |  ${t.name}${tag}  |  ${t.angle}°  |  Pwr ${t.power}  |  ${t.selectedWeapon} (${ammo})  |  $${t.money}`;
  ui.style.borderColor = t.color;
}

function updateWeaponIndicator() {
  if (gameOver) return;
  const t   = tanks[currentPlayer];
  const inv = t.inventory[t.selectedWeapon];
  const ammo = inv === Infinity ? '∞' : String(inv);
  document.getElementById('weapon-indicator').innerHTML =
    `<span style="color:${t.color}">${t.selectedWeapon}</span><br><small>${ammo} &nbsp;|&nbsp; $${t.money}</small>`;
}

// ── weapon cycling ─────────────────────────────────────────────────────────
function cycleWeapon(dir) {
  const t = tanks[currentPlayer];
  const available = Object.keys(WEAPONS).filter(name =>
    t.inventory[name] === Infinity || t.inventory[name] > 0
  );
  if (available.length <= 1) return;
  const idx = available.indexOf(t.selectedWeapon);
  t.selectedWeapon = available[((idx + dir) + available.length) % available.length];
  updateUI();
  updateWeaponIndicator();
}

// ── shop ───────────────────────────────────────────────────────────────────
function renderShop(playerIndex) {
  const t = tanks[playerIndex];
  document.getElementById('shop-balance').textContent = `Cash: $${t.money}`;

  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';

  for (const [name, wep] of Object.entries(WEAPONS)) {
    const owned    = t.inventory[name];
    const ownedStr = owned === Infinity ? '∞' : String(owned);
    const costStr  = wep.cost === 0 ? 'FREE' : `$${wep.cost}`;
    const canBuy   = wep.cost > 0 && t.money >= wep.cost;

    const card = document.createElement('div');
    card.className = 'shop-card';
    card.innerHTML = `
      <h3>${name}</h3>
      <div class="shop-desc">${wep.desc}</div>
      <div class="shop-meta">
        <span class="shop-cost">${costStr}</span>
        &nbsp;&nbsp;
        <span class="shop-owned">Owned: ${ownedStr}</span>
      </div>
      <button ${canBuy ? '' : 'disabled'}>${wep.cost === 0 ? 'Infinite' : 'BUY'}</button>
    `;
    if (canBuy) {
      card.querySelector('button').addEventListener('click', () => {
        t.money -= wep.cost;
        t.inventory[name]++;
        if (t.selectedWeapon === 'Baby Missile') t.selectedWeapon = name;
        renderShop(playerIndex);
      });
    }
    grid.appendChild(card);
  }
}

// ── CPU auto-buy ───────────────────────────────────────────────────────────
function cpuAutoBuy(playerIndex) {
  const t = tanks[playerIndex];
  // Buy the highest-damage weapon the CPU can afford (greedy, one purchase)
  const best = Object.entries(WEAPONS)
    .filter(([, wep]) => wep.cost > 0 && t.money >= wep.cost)
    .sort(([, a], [, b]) => b.hitDamage - a.hitDamage)[0];
  if (best) {
    t.money -= best[1].cost;
    t.inventory[best[0]]++;
    if (t.selectedWeapon === 'Baby Missile') t.selectedWeapon = best[0];
  }
}

// ── shop phase (runs at game/round start, cycles all players) ──────────────
function runShopPhase(onComplete) {
  const playerList = tanks.map((_, i) => i);
  let pos = 0;

  function shopNext() {
    while (pos < playerList.length && tanks[playerList[pos]].health <= 0) pos++;
    if (pos >= playerList.length) { onComplete(); return; }

    const idx = playerList[pos++];

    if (tanks[idx].isAI) {
      cpuAutoBuy(idx);
      setTimeout(shopNext, 350);
    } else {
      openShopForPlayer(idx, shopNext);
    }
  }

  shopNext();
}

function openShopForPlayer(playerIndex, onDone) {
  const t = tanks[playerIndex];
  shopOpen = true;
  document.getElementById('shop-title').innerHTML =
    `WEAPONS SHOP — <span style="color:${t.color}">${t.name}</span>`;
  renderShop(playerIndex);
  shopEl.style.display = 'block';

  const btn = document.getElementById('shop-done');
  const handler = () => {
    btn.removeEventListener('click', handler);
    shopEl.style.display = 'none';
    shopOpen = false;
    updateUI();
    updateWeaponIndicator();
    onDone();
  };
  btn.addEventListener('click', handler);
}

// ── CPU AI ─────────────────────────────────────────────────────────────────
function cpuSelectTarget(tankIndex) {
  const shooter = tanks[tankIndex];
  let bestIdx = -1, bestDist = Infinity;
  for (let i = 0; i < tanks.length; i++) {
    if (i === tankIndex || tanks[i].health <= 0) continue;
    const dist = Math.abs(tanks[i].x - shooter.x);
    if (dist < bestDist) { bestDist = dist; bestIdx = i; }
  }
  return bestIdx;
}

function cpuSimulateLanding(shooter, angleDeg, power) {
  const rad   = angleDeg * Math.PI / 180;
  const spd   = power * POWER_SCALE;
  const wAcc  = wind * WIND_SCALE;
  const bodyY = shooter.y - 11;

  let x  = shooter.x + Math.cos(rad) * (CANNON_LEN + 5);
  let y  = bodyY    - Math.sin(rad) * (CANNON_LEN + 5);
  let vx = Math.cos(rad) * spd;
  let vy = -Math.sin(rad) * spd;

  for (let step = 0; step < 12000; step++) {
    vx += wAcc    * AI_SIM_DT;
    vy += GRAVITY * AI_SIM_DT;
    x  += vx      * AI_SIM_DT;
    y  += vy      * AI_SIM_DT;
    if (x < 0 || x >= worldWidth || y > canvas.height + 100) return x;
    const xi = Math.round(x);
    if (xi >= 0 && xi < worldWidth && y >= terrain[xi]) return x;
  }
  return x;
}

function cpuSelectWeapon(tankIndex) {
  const t = tanks[tankIndex];
  const best = Object.entries(WEAPONS)
    .filter(([name]) => name !== 'Baby Missile' && (t.inventory[name] || 0) > 0)
    .sort(([, a], [, b]) => b.hitDamage - a.hitDamage)[0];
  t.selectedWeapon = best ? best[0] : 'Baby Missile';
}

function cpuComputeAim(tankIndex, targetIndex) {
  const shooter = tanks[tankIndex];
  const targetX = tanks[targetIndex].x;

  let bestAngle = shooter.x < targetX ? 45 : 135;
  let bestPower = 60;
  let bestDist  = Infinity;

  // Coarse sweep
  for (let a = 2; a <= 178; a += 3) {
    for (let p = 30; p <= MAX_POWER; p += 8) {
      const landX = cpuSimulateLanding(shooter, a, p);
      const dist  = Math.abs(landX - targetX);
      if (dist < bestDist) { bestDist = dist; bestAngle = a; bestPower = p; }
    }
  }

  // Fine sweep around best
  const aMin = Math.max(1,        bestAngle - 6);
  const aMax = Math.min(179,      bestAngle + 6);
  const pMin = Math.max(10,       bestPower - 12);
  const pMax = Math.min(MAX_POWER, bestPower + 12);
  bestDist = Infinity;

  for (let a = aMin; a <= aMax; a++) {
    for (let p = pMin; p <= pMax; p++) {
      const landX = cpuSimulateLanding(shooter, a, p);
      const dist  = Math.abs(landX - targetX);
      if (dist < bestDist) { bestDist = dist; bestAngle = a; bestPower = p; }
    }
  }

  // Apply difficulty noise
  const cfg    = AI_DIFFICULTY[shooter.difficulty] || AI_DIFFICULTY.medium;
  const aNoise = (Math.random() * 2 - 1) * cfg.angleNoise;
  const pNoise = (Math.random() * 2 - 1) * cfg.powerNoise;

  return {
    angle: Math.max(1,  Math.min(179,       Math.round(bestAngle + aNoise))),
    power: Math.max(10, Math.min(MAX_POWER, Math.round(bestPower + pNoise))),
  };
}

function startCpuTurn() {
  if (gameOver || shopOpen) return;
  const idx = currentPlayer;
  if (!tanks[idx] || !tanks[idx].isAI || tanks[idx].health <= 0) return;

  cpuSelectWeapon(idx);
  const targetIdx = cpuSelectTarget(idx);
  if (targetIdx === -1) return;

  const aim     = cpuComputeAim(idx, targetIdx);
  cpuAimAngle   = aim.angle;
  cpuAimPower   = aim.power;
  cpuThinkTimer = CPU_THINK_DELAY;
  cpuThinking   = true;

  updateUI();
  updateWeaponIndicator();
}

// ── fire ───────────────────────────────────────────────────────────────────
function fire() {
  if (projectiles.length > 0 || gameOver || shopOpen) return;
  const t   = tanks[currentPlayer];
  if (t.health <= 0) return;
  const wep = WEAPONS[t.selectedWeapon];

  if (wep.cost > 0) {
    if (t.inventory[t.selectedWeapon] <= 0) return;
    t.inventory[t.selectedWeapon]--;
    if (t.inventory[t.selectedWeapon] === 0) t.selectedWeapon = 'Baby Missile';
  }

  const rad   = t.angle * Math.PI / 180;
  const spd   = t.power * POWER_SCALE;
  const bodyY = t.y - 11;

  projectiles.push({
    x: t.x + Math.cos(rad) * (CANNON_LEN + 5),
    y: bodyY - Math.sin(rad) * (CANNON_LEN + 5),
    vx:  Math.cos(rad) * spd,
    vy: -Math.sin(rad) * spd,
    trail: [], type: wep.type, weapon: wep,
    owner: currentPlayer, mirvSplit: false,
  });

  soundFire();
  startWhistle();
  updateUI();
  updateWeaponIndicator();
}

// ── main loop ──────────────────────────────────────────────────────────────
function gameLoop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // CPU think / aim animation
  if (cpuThinking && !shopOpen && projectiles.length === 0 && !gameOver) {
    cpuThinkTimer -= dt;
    const t = tanks[currentPlayer];
    // smoothly swing cannon toward computed angle
    t.angle += (cpuAimAngle - t.angle) * Math.min(1, 6 * dt);
    if (cpuThinkTimer <= 0) {
      cpuThinking = false;
      t.angle = cpuAimAngle;
      t.power = cpuAimPower;
      fire();
    }
  }

  // Camera smooth pan
  camera.x += (camera.targetX - camera.x) * Math.min(1, 3.5 * dt);
  camera.y += (camera.targetY - camera.y) * Math.min(1, 3.5 * dt);

  // Projectile physics (iterate backwards for safe splicing)
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const proj = projectiles[i];
    proj.trail.push({ x: proj.x, y: proj.y });
    if (proj.trail.length > TRAIL_LEN) proj.trail.shift();

    proj.vx += wind * WIND_SCALE * dt;
    proj.vy += GRAVITY * dt;
    proj.x  += proj.vx * dt;
    proj.y  += proj.vy * dt;
    updateWhistle(proj.vx, proj.vy);

    if (proj.type === 'mirv' && !proj.mirvSplit && proj.vy >= 0) {
      proj.mirvSplit = true;
      spawnMirvChildren(proj);
      projectiles.splice(i, 1);
      continue;
    }

    const px = Math.round(proj.x);
    const py = proj.y;
    const w  = worldWidth, h = canvas.height;

    if (px < 0 || px >= w || py > h + 60) {
      projectiles.splice(i, 1);
      if (projectiles.length === 0 && !napalmTurnPending) {
        stopWhistle();
        if (!checkWin()) nextTurn();
      }
    } else if (py >= 0 && terrain[px] != null && py >= terrain[px]) {
      onImpact(proj, px, Math.round(py));
    }
  }

  if (projectiles.length === 0) stopWhistle();

  updateTankPhysics(dt);
  updateExplosions(dt);
  updateNapalm(dt);

  // Draw — world-space items under camera transform
  applyCamera();
  drawScene();
  drawAimGuide();
  for (let i = 0; i < tanks.length; i++) {
    drawTank(tanks[i], i === currentPlayer && projectiles.length === 0 && !shopOpen && !cpuThinking);
  }
  drawProjectiles();
  drawExplosions();
  drawNapalm();
  restoreCamera();

  // Screen-space HUD (drawn after restoreCamera)
  drawWindIndicator();

  animId = requestAnimationFrame(gameLoop);
}

// ── keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  ensureAudio();
  if (gameOver || projectiles.length > 0 || shopOpen || cpuThinking) return;
  if (!tanks || !tanks[currentPlayer] || tanks[currentPlayer].isAI) return;
  const t    = tanks[currentPlayer];
  const step = e.shiftKey ? 5 : 1;
  switch (e.key) {
    case 'ArrowLeft':  e.preventDefault(); t.angle = Math.min(180, t.angle + step); soundAngle(); break;
    case 'ArrowRight': e.preventDefault(); t.angle = Math.max(0,   t.angle - step); soundAngle(); break;
    case 'ArrowUp':    e.preventDefault(); t.power = Math.min(MAX_POWER, t.power + step); soundPower(+1); break;
    case 'ArrowDown':  e.preventDefault(); t.power = Math.max(1,         t.power - step); soundPower(-1); break;
    case ' ':          e.preventDefault(); fire(); return;
    case 'q': case 'Q': e.preventDefault(); cycleWeapon(-1); return;
    case 'e': case 'E': e.preventDefault(); cycleWeapon(+1); return;
  }
  updateUI();
});

document.addEventListener('click', e => {
  // Don't intercept clicks inside setup/shop/scoreboard
  if (setupEl.contains(e.target) || shopEl.contains(e.target) || scoreboardEl.contains(e.target)) return;
  if (gameOver && scoreboardEl.style.display === 'none') showSetup();
});

window.addEventListener('resize', () => {
  if (playerConfigs.length > 0) initGame();
});

// ── setup screen ───────────────────────────────────────────────────────────
function showSetup() {
  setupEl.style.display = 'block';
  document.getElementById('ui').style.display            = 'none';
  document.getElementById('keys').style.display          = 'none';
  document.getElementById('vol').style.display           = 'none';
  document.getElementById('weapon-indicator').style.display = 'none';
  winEl.style.display = 'none';
  renderSetupRows(currentSetupCount);
}

function hideSetup() {
  setupEl.style.display = 'none';
  document.getElementById('ui').style.display            = '';
  document.getElementById('keys').style.display          = '';
  document.getElementById('vol').style.display           = '';
  document.getElementById('weapon-indicator').style.display = '';
}

function renderSetupRows(n) {
  // Grow setupRowData as needed (don't shrink — preserve existing entries)
  while (setupRowData.length < n) {
    const i = setupRowData.length;
    setupRowData.push({ name: `P${i + 1}`, type: 'human', difficulty: 'medium' });
  }

  const container = document.getElementById('setup-rows');
  container.innerHTML = '';

  for (let i = 0; i < n; i++) {
    const data  = setupRowData[i];
    const color = PLAYER_COLORS[i];
    const isCPU = data.type === 'cpu';
    const row   = document.createElement('div');
    row.className = 'setup-row';

    row.innerHTML = `
      <div class="setup-swatch" style="background:${color}"></div>
      <input  class="setup-name"     type="text" value="${data.name}" maxlength="10">
      <button class="setup-type-btn${isCPU ? ' cpu-mode' : ''}">${isCPU ? 'CPU' : 'HUMAN'}</button>
      <select class="setup-diff" style="display:${isCPU ? '' : 'none'}">
        <option value="easy"   ${data.difficulty === 'easy'   ? 'selected' : ''}>Easy</option>
        <option value="medium" ${data.difficulty === 'medium' ? 'selected' : ''}>Med</option>
        <option value="hard"   ${data.difficulty === 'hard'   ? 'selected' : ''}>Hard</option>
      </select>
    `;

    const nameInput  = row.querySelector('.setup-name');
    const typeBtn    = row.querySelector('.setup-type-btn');
    const diffSelect = row.querySelector('.setup-diff');

    nameInput.addEventListener('input', () => {
      setupRowData[i].name = nameInput.value.trim() || `P${i + 1}`;
    });
    typeBtn.addEventListener('click', () => {
      setupRowData[i].type = setupRowData[i].type === 'human' ? 'cpu' : 'human';
      renderSetupRows(currentSetupCount);
    });
    diffSelect.addEventListener('change', () => {
      setupRowData[i].difficulty = diffSelect.value;
    });

    container.appendChild(row);
  }

  document.getElementById('setup-count-display').textContent = n;
}

function initSetupListeners() {
  document.getElementById('setup-minus').addEventListener('click', () => {
    if (currentSetupCount <= 2) return;
    currentSetupCount--;
    renderSetupRows(currentSetupCount);
  });

  document.getElementById('setup-plus').addEventListener('click', () => {
    if (currentSetupCount >= 10) return;
    currentSetupCount++;
    renderSetupRows(currentSetupCount);
  });

  // Rounds picker
  document.querySelectorAll('.rounds-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rounds-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      totalRounds = parseInt(btn.dataset.rounds, 10);
    });
  });

  document.getElementById('setup-start').addEventListener('click', () => {
    // Read totalRounds from active button
    const activeBtn = document.querySelector('.rounds-btn.active');
    if (activeBtn) totalRounds = parseInt(activeBtn.dataset.rounds, 10);

    // Read current row values directly from the DOM to capture any unsaved typing
    const rows = document.querySelectorAll('.setup-row');
    playerConfigs = [];
    rows.forEach((row, i) => {
      const name = row.querySelector('.setup-name').value.trim() || `P${i + 1}`;
      const type = setupRowData[i].type;
      const diff = row.querySelector('.setup-diff').value;
      setupRowData[i].name       = name;
      setupRowData[i].difficulty = diff;
      playerConfigs.push({ name, type, difficulty: diff, color: PLAYER_COLORS[i] });
    });
    hideSetup();
    initGame();
  });
}

// ── init ───────────────────────────────────────────────────────────────────
function initGame() {
  if (!playerConfigs || playerConfigs.length === 0) return;
  if (animId) cancelAnimationFrame(animId);

  gameOver          = false;
  projectiles       = [];
  napalmParticles   = [];
  explosions        = [];
  currentPlayer     = 0;
  lastTime          = null;
  turnCount         = 0;
  shopOpen          = false;
  napalmTurnPending = false;
  cpuThinking       = false;
  cpuThinkTimer     = 0;
  camera.x = camera.targetX = 0;
  camera.y = camera.targetY = 0;

  shopEl.style.display       = 'none';
  winEl.style.display        = 'none';
  scoreboardEl.style.display = 'none';

  // Initialize round tracking
  currentRound = 1;
  playerStats  = playerConfigs.map(cfg => ({
    name: cfg.name, color: cfg.color,
    kills: 0, damageDealt: 0, cashEarned: 0, roundWins: 0, score: 0,
  }));

  resize();

  // Scale world width with player count: 2p=1.0×, 4p=1.5×, 6p=2.0×, 8p=2.5×, 10p=3.0×
  const n = playerConfigs.length;
  worldWidth = Math.round(canvas.width * (0.5 + n * 0.25));

  generateTerrain();
  generateStars();
  placeTanks();
  cashAtRoundStart = tanks.map(t => t.money);
  newWind();
  updateUI();
  updateWeaponIndicator();

  // Set initial camera on first player
  setCameraTarget(tanks[0]);
  camera.x = camera.targetX;

  animId = requestAnimationFrame(gameLoop);  // start render loop so terrain is visible during shop

  runShopPhase(() => {
    currentPlayer = 0;
    const n = tanks.length;
    for (let i = 0; i < n; i++) {
      if (tanks[currentPlayer].health > 0) break;
      currentPlayer = (currentPlayer + 1) % n;
    }
    updateUI();
    updateWeaponIndicator();
    setCameraTarget(tanks[currentPlayer]);
    if (tanks[currentPlayer].isAI) setTimeout(startCpuTurn, 400);
  });
}

// ── entry point ────────────────────────────────────────────────────────────
initSetupListeners();
showSetup();
</script>
</body>
